version: '3.8'
services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    restart: unless-stopped
    env_file:
      - stack.env
    ports:
      - 13133:13133
      - 4317:4317
      - 4318:4318
      - 1888:1888
      - 8859:8889
    depends_on:
      - loki
      - mimir
      - tempo
      - pyroscope
      - prometheus
    volumes:
      - /root/easy-lgtm/config/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    command:
      - --config=/etc/otel-collector-config.yaml
      - --feature-gates=service.profilesSupport

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    restart: unless-stopped
    env_file:
      - stack.env
    ports:
      - "12345:12345"
    volumes:
      - /root/easy-lgtm/config/prometheus.yaml:/etc/alloy/config.alloy
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - 9090:9090
    volumes:
      - /root/easy-lgtm/config/prometheus.yaml:/etc/prometheus/prometheus.yaml
    command:
      - --config.file=/etc/prometheus/prometheus.yaml
      - --enable-feature=remote-write-receiver
      - --enable-feature=exemplar-storage
      - --enable-feature=native-histograms

  mimir:
    image: grafana/mimir:latest
    container_name: mimir
    restart: unless-stopped
    env_file:
      - stack.env
    volumes:
      - /root/easy-lgtm/config/mimir-config.yaml:/etc/mimir.yaml
    command:
      - --config.file=/etc/mimir.yaml
      - --config.expand-env=true

  pyroscope:
    image: grafana/pyroscope:latest
    container_name: pyroscope
    restart: unless-stopped
    user: "0:0"
    ports:
      - "4040:4040"
      - "4041:4041"
    env_file:
      - stack.env
    volumes:
      - /root/easy-lgtm/config/pyroscope-config.yaml:/etc/pyroscope/server.yaml
      - pyroscope-data:/data/pyroscope
    command:
      - --config.file=/etc/pyroscope/server.yaml
      - --config.expand-env=true

  loki:
    image: grafana/loki:latest
    container_name: grafana-loki
    restart: unless-stopped
    ports:
      - 3100:3100
    env_file:
      - stack.env
    volumes:
      - /root/easy-lgtm/config/loki-config.yaml:/etc/loki/config.yaml
    command: -config.file=/etc/loki/local-config.yaml -config.expand-env=true

  tempo:
    image: grafana/tempo:2.8.2
    container_name: grafana-tempo
    restart: unless-stopped
    ports:
      - "3200:3200"
    env_file:
      - stack.env
    volumes:
      - /root/easy-lgtm/config/tempo-config.yaml:/etc/tempo/tempo-config.yaml
    command: -config.file=/etc/tempo/tempo-config.yaml -config.expand-env=true

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - stack.env
    volumes:
      - /root/easy-lgtm/config/grafana/grafana-dashboards.yaml:/etc/grafana/provisioning/dashboards/grafana-dashboards.yaml
      - /root/easy-lgtm/config/grafana/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - /root/easy-lgtm/dashboards:/var/lib/grafana/dashboards

volumes:
  pyroscope-data:
  prometheus-data:
