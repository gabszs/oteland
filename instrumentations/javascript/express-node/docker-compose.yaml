services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - POSTGRES_URL=postgresql://app_user:app_password@postgres:5432/loglog
      - REDIS_URL=redis:6379,defaultDatabase=0,abortConnect=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=app_user
      - POSTGRES_PASSWORD=app_password
      - POSTGRES_DB=loglog
    ports:
      - "5455:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d loglog"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
