apiVersion: v1
kind: ConfigMap
metadata:
  name: password-generator-config
  namespace: password-generator-dotnet
data:
  ASPNETCORE_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:80"
  # REDIS_CONNECTION_STRING: "redis-master.redis.svc.cluster.local:6379,defaultDatabase=0,abortConnect=false"
  REDIS_CONNECTION_STRING: "192.168.1.3:6379,defaultDatabase=0,abortConnect=false"
  EXTERNAL_API_URL: "https://password.gabrielcarvalho.dev"
  PROTECTED_EXTERNAL_API_URL: "https://auth-fastapi.gabrielcarvalho.dev/v1/passwords/protected"
  CACHE_TTL_SECONDS: "5"
  KAFKA_BOOTSTRAP_SERVERS: "192.168.1.3:9092"
  KAFKA_DEFAULT_TOPIC: "orders"
  KAFKA_DEFAULT_MESSAGE_KEY: "order-task"
